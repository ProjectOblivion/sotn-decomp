options:
  platform: psp
  basename: bobo5
  base_path: ..
  build_path: build/pspeu
  target_path: disks/pspeu/PSP_GAME/USRDIR/res/ps/PSPBIN/bo5.bin
  asm_path: asm/pspeu/boss/bo5_psp
  asset_path: assets/boss/bo5
  src_path: src/boss/bo5
  ld_script_path: build/pspeu/bobo5.ld
  compiler: GCC
  symbol_addrs_path:
    - config/symbols.pspeu.txt
    - config/symbols.pspeu.bobo5.txt
  undefined_funcs_auto_path: config/undefined_funcs_auto.pspeu.bobo5.txt
  undefined_syms_auto_path: config/undefined_syms_auto.pspeu.bobo5.txt
  find_file_boundaries: true
  use_legacy_include_asm: false
  migrate_rodata_to_functions: true
  asm_jtbl_label_macro: jlabel
  symbol_name_format: pspeu_$VRAM
  section_order:
    - .text
    - .data
    - .rodata
    - .bss
  ld_bss_is_noload: true
  disasm_unknown: true
  disassemble_all: true
  global_vram_start: 0x8000000
  asm_inc_header: |
    .set noat      /* allow manual use of $at */
    .set noreorder /* don't insert nops after branches */
sha1: 667db208e0843664ffff24f444955806f8c1adaf
segments:
  - [0x0, bin, mwo_header]
  - name: bobo5
    type: code
    start: 0x80
    vram:  0x09237700
    bss_size: 0x800
    align: 128
    subalign: 8
    subsegments:
      - [0x80, c, bo5_psp/80] # create_entity
      # - [0x1028, c, bo5_psp/80] # e_life_up
      # - [0x1CA8, c, bo5_psp/80] # e_stage_name
      # - [0x2B28, c, bo5_psp/80] # e_red_door
      # - [0x3E30, c, bo5_psp/80] # st_update
      # - [0x4368, c, bo5_psp/80] # e_particles
      # - [0x58F8, c, bo5_psp/80]
      # - [0x9C88, c, bo5_psp/80] # e_misc
      # - [0xA238, c, bo5_psp/80]
      # - [0xA498, c, bo5_psp/80] # collision
      # - [0xC670, c, bo5_psp/80] # popup
      # - [0xCC68, c, bo5_psp/80] # e_room_fg
      # - [0xCD80, c, bo5_psp/80]
      # - [0xE3A0, c, bo5_psp/80] # prim_helpers
      # - [0xEAE0, c, bo5_psp/80]
      # - [0x18650, c, bo5_psp/80] # e_room_bg
      # - [0x18730, c, bo5_psp/80] # e_lock_camera
      # - [0x18990, c, bo5_psp/80]
      - [0x1B480, data]
      - [0x36F00, .rodata, 80]
      - {type: bss, vram: 0x926E880}
  - [0x37200]
