options:
  platform: psp
  basename: strdai
  base_path: ..
  build_path: build/pspeu
  target_path: disks/pspeu/PSP_GAME/USRDIR/res/ps/PSPBIN/rdai.bin
  asm_path: asm/pspeu/st/rdai_psp
  asset_path: assets/st/rdai
  src_path: src/st/rdai
  ld_script_path: build/pspeu/strdai.ld
  compiler: GCC
  symbol_addrs_path:
    - config/symbols.pspeu.txt
    - config/symbols.pspeu.strdai.txt
  undefined_funcs_auto_path: config/undefined_funcs_auto.pspeu.strdai.txt
  undefined_syms_auto_path: config/undefined_syms_auto.pspeu.strdai.txt
  find_file_boundaries: true
  use_legacy_include_asm: false
  migrate_rodata_to_functions: true
  asm_jtbl_label_macro: jlabel
  symbol_name_format: pspeu_$VRAM
  section_order:
    - .text
    - .data
    - .rodata
    - .bss
  ld_bss_is_noload: true
  disasm_unknown: true
  disassemble_all: true
  global_vram_start: 0x8000000
  asm_inc_header: |
    .set noat      /* allow manual use of $at */
    .set noreorder /* don't insert nops after branches */
sha1: 566264407fc79bb8d7928e08b04c79862df82333
segments:
  - [0x0, bin, mwo_header]
  - name: strdai
    type: code
    start: 0x80
    vram:  0x09237700
    bss_size: 0x200
    align: 128
    subalign: 8
    subsegments:
      # - [0x80, c, rdai_psp/80]
      # - [0x2260, c, rdai_psp/80] # create_entity
      # - [0x3208, c, rdai_psp/80]
      # - [0x5808, c, rdai_psp/80] # e_stage_name
      # - [0x6688, c, rdai_psp/80] # e_red_door
      # - [0x7990, c, rdai_psp/80] # st_update
      # - [0x7EC8, c, rdai_psp/80] # e_particles
      # - [0x9458, c, rdai_psp/80]
      # - [0xA748, c, rdai_psp/80] # e_collect
      # - [0xE998, c, rdai_psp/80]
      # - [0xEAE0, c, rdai_psp/80] # e_misc
      # - [0xF1E8, c, rdai_psp/80] # collision
      # - [0x113C0, c, rdai_psp/80] # popup
      # - [0x119B8, c, rdai_psp/80] # e_room_fg
      # - [0x11AD0, c, rdai_psp/80]
      # - [0x173A0, c, rdai_psp/80] # prim_helpers
      # - [0x17AE0, c, rdai_psp/80]
      # - [0x19CC8, c, rdai_psp/80] # e_lock_camera
      # - [0x19F28, c, rdai_psp/80]
      - [0x1C900, data]
      - [0x4C100, .rodata, 80]
      - {type: bss, vram: 0x9283900}
  - [0x4C280]
